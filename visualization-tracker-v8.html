<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualization Tracker – Champion Sports Mindset</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --card: #111111;
    --card2: #1a1a1a;
    --gold: #b8860b;
    --gold2: #c9960c;
    --gold3: #d4a017;
    --text: #f1f5f9;
    --muted: #666;
    --border: #222;
    --success: #34d399;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding: 24px 18px 48px;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(201,150,12,0.1) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 100%, rgba(201,150,12,0.05) 0%, transparent 40%);
  }

  /* HERO HEADER */
  .hero-header {
    text-align: center;
    margin-bottom: 28px;
    padding-top: 8px;
    position: relative;
  }

  .hero-eyebrow {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    color: var(--gold);
    margin-bottom: 6px;
    display: block;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 5rem);
    letter-spacing: 0.06em;
    line-height: 0.9;
    background: linear-gradient(
      to bottom,
      #5a3a00 0%,
      #a06010 18%,
      #c88820 35%,
      #e8b86d 50%,
      #c88820 65%,
      #a06010 82%,
      #5a3a00 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: block;
    margin-bottom: 8px;
  }

  .hero-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .hero-divider-line {
    flex: 1;
    max-width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }

  .hero-divider-line.right {
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  .hero-divider-icon {
    width: 36px;
    height: 36px;
    object-fit: contain;
    filter: drop-shadow(0 0 8px rgba(201,150,12,0.5));
  }

  .hero-sub {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
  }

  /* DATE NAV */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 20px;
  }

  .date-nav button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 34px; height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s;
  }

  .date-nav button:hover { background: var(--card2); border-color: var(--gold); }

  #current-date {
    font-size: 0.85rem;
    font-weight: 500;
    min-width: 180px;
    text-align: center;
    color: var(--text);
  }

  /* STREAK */
  .streak-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }

  .streak-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 22px;
    border-radius: 100px;
    background: rgba(201,150,12,0.12);
    border: 1px solid rgba(201,150,12,0.35);
  }

  .streak-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: var(--gold2);
    line-height: 1;
  }

  .streak-lbl {
    font-size: 0.78rem;
    color: var(--muted);
  }

  /* MAIN CARD */
  .main-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    max-width: 480px;
    margin: 0 auto 18px;
    position: relative;
  }

  .gold-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold2), var(--gold3), var(--gold2), var(--gold));
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* COMPLETION */
  .completion-section {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--card2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s;
    user-select: none;
  }

  .completion-section:hover { background: #202020; }

  .completion-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .check-ring {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    color: var(--gold);
    transition: all 0.25s;
    flex-shrink: 0;
  }

  .check-ring.done {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-color: transparent;
    color: #0a0a0a;
    box-shadow: 0 0 18px rgba(201,150,12,0.5);
    transform: scale(1.08);
  }

  .completion-text strong {
    display: block;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
  }

  .completion-text span {
    font-size: 0.72rem;
    color: var(--muted);
  }

  .status-badge {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    border-radius: 100px;
    background: var(--border);
    color: var(--muted);
    transition: all 0.2s;
    white-space: nowrap;
  }

  .status-badge.done {
    background: rgba(201,150,12,0.2);
    color: var(--gold2);
    border: 1px solid rgba(201,150,12,0.4);
  }

  /* CARD BODY */
  .card-body { padding: 22px 20px; }

  .field-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* DURATION */
  .duration-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 4px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    cursor: pointer;
    box-shadow: 0 0 8px rgba(201,150,12,0.6);
  }

  .duration-display {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: var(--gold2);
    min-width: 64px;
    text-align: center;
    letter-spacing: 0.04em;
  }

  /* MOOD */
  .mood-wrap { margin-bottom: 20px; }

  .mood-stars {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .star {
    font-size: 1.5rem;
    cursor: pointer;
    transition: transform 0.15s, filter 0.15s;
    filter: grayscale(1) opacity(0.25);
    user-select: none;
  }

  .star.lit { filter: none; transform: scale(1.1); }
  .star:hover { transform: scale(1.25); filter: none; }

  .mood-label {
    font-size: 0.72rem;
    color: var(--gold2);
    font-weight: 500;
    margin-left: 4px;
  }

  /* NOTES */
  .notes-wrap { margin-bottom: 0; }

  textarea {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    padding: 12px 14px;
    resize: none;
    height: 78px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  textarea:focus { border-color: var(--gold); }
  textarea::placeholder { color: var(--muted); }

  /* WEEKLY */
  .weekly-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 18px 20px;
    max-width: 480px;
    margin: 0 auto 18px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.08em;
    color: var(--gold);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .day-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
  }

  .day-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .day-name {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
  }

  .day-dot {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 7px;
    background: var(--card2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    color: transparent;
    transition: all 0.3s;
  }

  .day-dot.done {
    background: rgba(201,150,12,0.25);
    border-color: var(--gold);
    color: var(--gold2);
  }

  .day-dot.today {
    border-color: var(--gold2);
    box-shadow: 0 0 0 1px var(--gold2);
  }

  /* STATS */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 480px;
    margin: 0 auto 18px;
  }

  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 8px;
    text-align: center;
  }

  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.9rem;
    line-height: 1;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-lbl {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    margin-top: 4px;
  }

  /* SAVE BUTTON */
  .save-btn {
    display: block;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    padding: 15px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border: none;
    border-radius: 16px;
    color: #0a0a0a;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.14em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 22px rgba(201,150,12,0.35);
  }

  .save-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .save-btn:active { transform: scale(0.98); }

  .toast {
    text-align: center;
    font-size: 0.8rem;
    color: var(--success);
    margin-top: 10px;
    opacity: 0;
    transition: opacity 0.4s;
    letter-spacing: 0.04em;
  }

  .toast.show { opacity: 1; }
</style>
</head>

<div class="date-nav">
  <button onclick="changeDay(-1)">&#8249;</button>

</div>

<!-- STREAK -->
<div class="streak-badge">
  <div class="streak-pill">
    🔥 <span class="streak-num" id="streak-num">0</span>
    <span class="streak-lbl">day streak</span>
  </div>
</div>

<!-- MAIN CARD -->
<div class="main-card">
  <div class="gold-bar"></div>

  <!-- COMPLETION -->
  <div class="completion-section" onclick="toggleDone()">
    <div class="completion-left">
      <div class="check-ring" id="check-ring"></div>
      <div class="completion-text">
        <strong>Completed Today?</strong>
        <span>Tap to mark your session done</span>
      </div>
    </div>
    <div class="status-badge" id="status-badge">Pending</div>
  </div>

  <div class="card-body">

    <!-- DURATION -->
    <div class="field-label">⏱️ Session Duration</div>
    <div class="duration-wrap">
      <input type="range" id="duration-slider" min="1" max="60" value="10"
        oninput="updateDuration(this.value)">
      <div class="duration-display" id="duration-val">10m</div>
    </div>

    <!-- MOOD -->
    <div class="mood-wrap">
      <div class="field-label">⭐ Mood / Energy Rating</div>
      <div style="display:flex; align-items:center;">
        <div class="mood-stars" id="mood-stars">
          <span class="star" onclick="setMood(1)">⭐</span>
          <span class="star" onclick="setMood(2)">⭐</span>
          <span class="star" onclick="setMood(3)">⭐</span>
          <span class="star" onclick="setMood(4)">⭐</span>
          <span class="star" onclick="setMood(5)">⭐</span>
        </div>
        <span class="mood-label" id="mood-label"></span>
      </div>
    </div>

    <!-- NOTES -->
    <div class="notes-wrap">
      <div class="field-label">📝 Session Notes</div>
      <textarea id="notes" placeholder="What did you visualize? How vivid was it? Any breakthroughs..." oninput="autoSave()"></textarea>
    </div>

  </div>
</div>

  <div class="section-title">📅 This Week</div>
  <div class="day-row" id="week-grid"></div>
</div>

<div class="stats-row">
  <div class="stat-box">
    <div class="stat-val" id="stat-week">0</div>
    <div class="stat-lbl">Days This Week</div>
  </div>
  <div class="stat-box">
    <div class="stat-val" id="stat-mins">0m</div>
    <div class="stat-lbl">Week Minutes</div>
  </div>

    <div class="stat-val" id="stat-mood">–</div>
    <div class="stat-lbl">Avg Mood</div>
  </div>
</div>

<!-- SAVE -->
<button class="save-btn" onclick="saveDay()">💾 Save Session</button>
<div class="toast" id="toast">✅ Session saved!</div>

<script>
const MOOD_LABELS = ['','Low Energy','Getting There','Focused','In the Zone','Peak State 🔥'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let currentOffset = 0;
let allData = JSON.parse(localStorage.getItem('csm_viz_tracker') || '{}');

function todayKey() {
  const d = new Date();
  d.setDate(d.getDate() + currentOffset);
  return d.toISOString().split('T')[0];
}

function getDateLabel() {
  const d = new Date();
  d.setDate(d.getDate() + currentOffset);
  if (currentOffset === 0) return 'Today — ' + d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
  if (currentOffset === -1) return 'Yesterday — ' + d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
}

function getDayData() {
  const k = todayKey();
  if (!allData[k]) allData[k] = { done: false, duration: 10, mood: 0, notes: '' };
  return allData[k];
}

function changeDay(d) { currentOffset += d; render(); }

function toggleDone() {
  const td = getDayData();
  td.done = !td.done;
  persist(); render();
}

function updateDuration(val) {
  getDayData().duration = +val;
  document.getElementById('duration-val').textContent = val + 'm';
  persist(); renderStats();
}

function setMood(val) {
  getDayData().mood = val;
  persist(); renderMoodStars(val);
}

function renderMoodStars(val) {
  document.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('lit', i < val));
  document.getElementById('mood-label').textContent = val ? MOOD_LABELS[val] : '';
}

function autoSave() {
  getDayData().notes = document.getElementById('notes').value;
  persist();
}

function persist() {
  localStorage.setItem('csm_viz_tracker', JSON.stringify(allData));
}

function saveDay() {
  getDayData().notes = document.getElementById('notes').value;
  persist();
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function getStreak() {
  let streak = 0;
  const d = new Date();
  while (true) {
    const k = d.toISOString().split('T')[0];
    if (allData[k] && allData[k].done) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return streak;
}

function renderStats() {
  const today = new Date();
  const start = new Date(today);
  start.setDate(today.getDate() - today.getDay());
  let weekDays = 0, weekMins = 0, moodSum = 0, moodCount = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const k = d.toISOString().split('T')[0];
    const td = allData[k];
    if (!td) continue;
    if (td.done) weekDays++;
    weekMins += td.duration || 0;
    if (td.mood > 0) { moodSum += td.mood; moodCount++; }
  }
  document.getElementById('stat-week').textContent = weekDays;
  document.getElementById('stat-mins').textContent = weekMins + 'm';
  document.getElementById('stat-mood').textContent = moodCount ? (moodSum / moodCount).toFixed(1) : '–';
}

function renderWeekGrid() {
  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';
  const today = new Date();
  const start = new Date(today);
  start.setDate(today.getDate() - today.getDay());
  const todayStr = today.toISOString().split('T')[0];

  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const k = d.toISOString().split('T')[0];
    const done = allData[k] && allData[k].done;
    const isToday = k === todayStr;
    const col = document.createElement('div');
    col.className = 'day-col';
    col.innerHTML = `
      <div class="day-name">${DAYS[d.getDay()]}</div>
      <div class="day-dot ${done ? 'done' : ''} ${isToday ? 'today' : ''}">${done ? '✓' : ''}</div>
    `;
    grid.appendChild(col);
  }
}

function render() {
  document.getElementById('current-date').textContent = getDateLabel();
  const td = getDayData();

  const ring = document.getElementById('check-ring');
  const badge = document.getElementById('status-badge');
  ring.className = 'check-ring' + (td.done ? ' done' : '');
  ring.textContent = td.done ? '✓' : '';
  badge.className = 'status-badge' + (td.done ? ' done' : '');
  badge.textContent = td.done ? 'Done ✓' : 'Pending';

  document.getElementById('duration-slider').value = td.duration;
  document.getElementById('duration-val').textContent = td.duration + 'm';
  renderMoodStars(td.mood);
  document.getElementById('notes').value = td.notes;
  document.getElementById('streak-num').textContent = getStreak();
  renderWeekGrid();
  renderStats();
}

render();
</script>
</body>
</html>
